<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="logo-wrap" href="../index.html">
        <img src="../svg/Logo.svg" alt="GOTCHA" class="logo" onerror="this.onerror=null;this.src='../img/logo-placeholder.svg'">
      </a>
      <nav class="nav-row nav-left">
        <a href="video.html" class="nav-item">Vidéos</a>
        <a href="histoire.html" class="nav-item">Histoire</a>
        <a href="carte.html" class="nav-item">Carte</a>
        <a href="contact.html" class="nav-item">Contact</a>
      </nav>
    </header>

    <main class="page-wrap">
      <h2>Contact</h2>
      <p class="hint" style="text-align:center; margin-bottom:24px;">Pose tes questions à notre assistant ou retrouve tous nos liens</p>
      
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:32px;">
        <a href="chatbot.html" style="text-decoration:none; color:inherit;">
          <div style="background:var(--card-bg); border:2px solid var(--border); border-radius:14px; padding:24px; text-align:center; transition:all 0.3s ease; cursor:pointer;" onmouseover="this.style.borderColor='var(--primary)'; this.style.boxShadow='0 8px 24px rgba(43,111,214,0.25)'" onmouseout="this.style.borderColor='var(--border)'; this.style.boxShadow='none'">
            <h3 style="color:var(--primary); margin-top:0;">🤖 Chatbot</h3>
            <p style="color:var(--muted); margin:0;">Pose tes questions sur GOTCHA et les Ydays. Notre assistant répond 24h/24</p>
          </div>
        </a>
        <a href="https://linktr.ee/mediagotchaproductions" target="_blank" style="text-decoration:none; color:inherit;">
          <div style="background:linear-gradient(135deg, rgba(43,111,214,0.2) 0%, rgba(43,111,214,0.05) 100%); border:2px solid var(--primary); border-radius:14px; padding:24px; text-align:center; transition:all 0.3s ease; cursor:pointer;" onmouseover="this.style.borderColor='#7dd3fc'; this.style.boxShadow='0 8px 24px rgba(125,211,252,0.3)'; this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='var(--primary)'; this.style.boxShadow='none'; this.style.transform='translateY(0)'">
            <h3 style="color:var(--primary); margin-top:0;">🔗 Tous nos liens</h3>
            <p style="color:var(--muted); margin:0;">Retrouve tous nos réseaux et contacts en un seul endroit</p>
            <p style="color:#7dd3fc; margin:12px 0 0 0; font-weight:600; font-size:14px;">→ Ouvre Linktree</p>
          </div>
        </a>
      </div>
    </main>

    <footer class="site-footer">© GOTCHA</footer>
  </body>
</html>
